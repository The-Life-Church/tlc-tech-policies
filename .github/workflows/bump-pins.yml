# Bump installer pins — watches upstream releases for every version-pinned
# installer in this repo and opens a PR updating the pin (version + SHA-256
# where the script pins one) when a new release has survived the cooldown.
#
# ── Adding a new pinned installer ─────────────────────────────────────────────
# If the tool ships via GitHub releases: add an entry to the `github-release`
# job's matrix below — name, slug, repo, file, version_var, and (if the script
# pins a checksum) sha_var + checksums_asset + asset. Multi-arch tools pinning
# two SHAs also set sha_var2 + asset2 (same checksums file). That's it.
# If it ships from somewhere else, add a dedicated job modeled on the `node`
# job. Examples already present:
#   - Node's dist index — the `node` job
#   - npm registry — `npm view <pkg> version` + `time` for the cooldown date
#     (the `hyperframes` and `firebase-tools` jobs; version pin only, no SHA)
#   - a GitHub release that publishes NO checksums file — download each asset
#     and hash it in-CI, because the matrix can only awk a published checksums
#     file (the `ffmpeg` job)
#   - the Adoptium API — version+build+per-arch pkg SHAs straight from the API,
#     deliberately pinned to one LTS major (the `temurin` job)
# Tools with no pin (e.g. Homebrew — always-latest installer, self-updating)
# have nothing to bump and don't belong here.
# Convention also documented in the repo-root CLAUDE.md ("Adding a managed tool installer").
#
# Supply-chain posture:
#   - COOLDOWN_DAYS (default 14): a release younger than this is skipped —
#     compromised releases are usually detected and yanked within days, so
#     waiting lets the ecosystem do canary duty. Override via manual dispatch
#     for actively-exploited security fixes.
#   - The workflow never touches main. Every bump is a PR a human reviews:
#     check the linked release notes, then merge. Devices converge on their
#     next recurring Mosyle run.
#
# Requires repo setting: Settings -> Actions -> General ->
#   "Allow GitHub Actions to create and approve pull requests"
#
# Google Chat alerts (same pattern as tlc-claude-plugins):
#   - Repo secret CHAT_WEBHOOK_URL (per-repo webhook into the shared Chat space).
#     Unset secret -> notify steps log and exit 0; everything else still works.
#   - ✅ posted when a job opens a bump PR; ❌ posted when a job fails.
#   - Silent on no-ops (pin current, cooldown not met, branch already open).

name: Bump installer pins

on:
  schedule:
    - cron: '17 14 * * 1' # Mondays 14:17 UTC (~8:17/9:17 AM Memphis)
  workflow_dispatch:
    inputs:
      ignore_cooldown:
        description: 'Bump even if the release is younger than the cooldown (use for urgent security releases)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  COOLDOWN_DAYS: 14
  IGNORE_COOLDOWN: ${{ inputs.ignore_cooldown == true && 'true' || 'false' }}

jobs:
  # ── Node.js: special-cased because the source of truth is nodejs.org's dist
  # index (first entry with an "lts" name), not a GitHub release.
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check Node.js LTS
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FILE="software/node/install.sh"

          CURRENT=$(grep -m1 '^NODE_VERSION=' "$FILE" | cut -d'"' -f2)

          RELEASE=$(curl -fsSL https://nodejs.org/dist/index.json | jq -c '[.[] | select(.lts != false)][0]')
          LATEST=$(echo "$RELEASE" | jq -r '.version')
          REL_DATE=$(echo "$RELEASE" | jq -r '.date')

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "Node pin is current ($CURRENT). Nothing to do."
            exit 0
          fi

          AGE_DAYS=$(( ( $(date +%s) - $(date -d "$REL_DATE" +%s) ) / 86400 ))
          if [ "$IGNORE_COOLDOWN" != "true" ] && [ "$AGE_DAYS" -lt "$COOLDOWN_DAYS" ]; then
            echo "Node $LATEST is only ${AGE_DAYS}d old (< ${COOLDOWN_DAYS}d cooldown). Skipping until it ages."
            exit 0
          fi

          BRANCH="chore/bump-node-${LATEST}"
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists — PR presumably open. Skipping."
            exit 0
          fi

          SHA=$(curl -fsSL "https://nodejs.org/dist/${LATEST}/SHASUMS256.txt" | awk -v pkg="node-${LATEST}.pkg" '$2 == pkg {print $1}')
          if [ -z "$SHA" ]; then
            echo "ERROR: could not find SHA for node-${LATEST}.pkg in SHASUMS256.txt"
            exit 1
          fi

          git checkout -b "$BRANCH"
          sed -i "s|^NODE_VERSION=\".*\"|NODE_VERSION=\"${LATEST}\"|" "$FILE"
          sed -i "s|^NODE_SHA256=\".*\"|NODE_SHA256=\"${SHA}\"|" "$FILE"
          git add "$FILE"
          git commit -m "Bump Node.js pin: ${CURRENT} -> ${LATEST}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "Bump Node.js pin: ${CURRENT} -> ${LATEST}" \
            --body "$(cat <<EOF
          Automated pin bump from the \`bump-pins\` workflow.

          - **Version:** \`${CURRENT}\` -> \`${LATEST}\`
          - **Release date:** ${REL_DATE} (${AGE_DAYS} days old; cooldown ${COOLDOWN_DAYS}d, ignore_cooldown=${IGNORE_COOLDOWN})
          - **SHA-256:** \`${SHA}\` (from [SHASUMS256.txt](https://nodejs.org/dist/${LATEST}/SHASUMS256.txt))
          - **Release notes:** https://github.com/nodejs/node/releases/tag/${LATEST}

          Review checklist: release notes look sane, version is a real LTS release on nodejs.org.
          On merge, devices converge on their next recurring Mosyle run.
          EOF
          )")

          # Hand the PR details to the Chat notify step
          {
            echo "pr_url=${PR_URL}"
            echo "old=${CURRENT}"
            echo "new=${LATEST}"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Google Chat (bump PR opened)
        if: ${{ steps.bump.outputs.pr_url != '' }}
        env:
          WEBHOOK: ${{ secrets.CHAT_WEBHOOK_URL }}
          PR_URL: ${{ steps.bump.outputs.pr_url }}
          OLD: ${{ steps.bump.outputs.old }}
          NEW: ${{ steps.bump.outputs.new }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "CHAT_WEBHOOK_URL secret not set — skipping notify."; exit 0; fi
          TEXT=$(printf '%s\n%s' \
            "<${RUN_URL}|Bump installer pins> · <${REPO_URL}|${REPO}>" \
            "✅ Node.js: ${OLD} -> ${NEW} — <${PR_URL}|review the PR>")
          jq -n --arg text "$TEXT" '{text: $text}' | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"

      - name: Notify Google Chat (job failed)
        if: ${{ failure() }}
        env:
          WEBHOOK: ${{ secrets.CHAT_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "CHAT_WEBHOOK_URL secret not set — skipping notify."; exit 0; fi
          TEXT=$(printf '%s\n%s' \
            "<${RUN_URL}|Bump installer pins> · <${REPO_URL}|${REPO}>" \
            "❌ Node.js job failed — <${RUN_URL}|run logs>")
          jq -n --arg text "$TEXT" '{text: $text}' | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"

  # ── Everything that ships via GitHub releases: one matrix entry per tool. ──
  # version_var is replaced in `file`; if sha_var is set, the SHA-256 is pulled
  # from checksums_asset ({V} = bare version) and replaced too. Tools without a
  # pinned SHA (signed pkgs verified by Gatekeeper/installer) leave sha_var "".
  # Multi-arch tools pinning a second SHA set sha_var2 + asset2 (same
  # checksums_asset); single-artifact tools leave them "".
  github-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GitHub CLI
            slug: gh
            repo: cli/cli
            file: software/gh/install.sh
            version_var: GH_VERSION
            sha_var: GH_SHA256
            checksums_asset: gh_{V}_checksums.txt
            asset: gh_{V}_macOS_universal.pkg
            sha_var2: ''
            asset2: ''
            note: 'Reminder: this pkg ships **unsigned** — the pinned SHA is the only integrity check.'
          - name: dockutil
            slug: dockutil
            repo: kcrawford/dockutil
            file: hardware/dock/install-staff-dock.sh
            version_var: DOCKUTIL_VERSION
            sha_var: ''
            checksums_asset: ''
            asset: ''
            sha_var2: ''
            asset2: ''
            note: 'Signed Developer ID pkg (no SHA pinned in the script — installer verifies the signature).'
          - name: Higgsfield CLI
            slug: higgsfield
            repo: higgsfield-ai/cli
            file: software/higgsfield/install.sh
            version_var: HIGGSFIELD_VERSION
            sha_var: HIGGSFIELD_SHA256_ARM64
            checksums_asset: checksums.txt
            asset: hf_{V}_darwin_arm64.tar.gz
            sha_var2: HIGGSFIELD_SHA256_AMD64
            asset2: hf_{V}_darwin_amd64.tar.gz
            note: 'Unsigned binary tarballs — the pinned per-arch SHAs are the only integrity check.'
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check ${{ matrix.name }}
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
          NAME: ${{ matrix.name }}
          SLUG: ${{ matrix.slug }}
          REPO: ${{ matrix.repo }}
          FILE: ${{ matrix.file }}
          VERSION_VAR: ${{ matrix.version_var }}
          SHA_VAR: ${{ matrix.sha_var }}
          CHECKSUMS_ASSET: ${{ matrix.checksums_asset }}
          ASSET: ${{ matrix.asset }}
          SHA_VAR2: ${{ matrix.sha_var2 }}
          ASSET2: ${{ matrix.asset2 }}
          NOTE: ${{ matrix.note }}
        run: |
          set -euo pipefail

          CURRENT=$(grep -m1 "^${VERSION_VAR}=" "$FILE" | cut -d'"' -f2)

          RELEASE=$(gh api "repos/${REPO}/releases/latest")
          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          LATEST="${TAG#v}" # bare version whether or not the tag has a v prefix
          PUBLISHED=$(echo "$RELEASE" | jq -r '.published_at')

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "${NAME} pin is current (${CURRENT}). Nothing to do."
            exit 0
          fi

          AGE_DAYS=$(( ( $(date +%s) - $(date -d "$PUBLISHED" +%s) ) / 86400 ))
          if [ "$IGNORE_COOLDOWN" != "true" ] && [ "$AGE_DAYS" -lt "$COOLDOWN_DAYS" ]; then
            echo "${NAME} ${LATEST} is only ${AGE_DAYS}d old (< ${COOLDOWN_DAYS}d cooldown). Skipping until it ages."
            exit 0
          fi

          BRANCH="chore/bump-${SLUG}-${LATEST}"
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists — PR presumably open. Skipping."
            exit 0
          fi

          SHA_LINE=""
          if [ -n "$SHA_VAR" ]; then
            CHECKSUMS_FILE="${CHECKSUMS_ASSET//\{V\}/$LATEST}"
            CHECKSUMS_URL="https://github.com/${REPO}/releases/download/${TAG}/${CHECKSUMS_FILE}"
            CHECKSUMS=$(curl -fsSL "$CHECKSUMS_URL")
            ASSET_FILE="${ASSET//\{V\}/$LATEST}"
            SHA=$(echo "$CHECKSUMS" | awk -v pkg="$ASSET_FILE" '$2 == pkg {print $1}')
            if [ -z "$SHA" ]; then
              echo "ERROR: could not find SHA for ${ASSET_FILE} in ${CHECKSUMS_FILE}"
              exit 1
            fi
            SHA_LINE="- **SHA-256:** \`${SHA}\` (\`${ASSET_FILE}\`, from [${CHECKSUMS_FILE}](${CHECKSUMS_URL}))"
          fi

          # Optional second artifact (multi-arch tools pinning per-arch SHAs)
          SHA2=""
          if [ -n "$SHA_VAR2" ]; then
            ASSET_FILE2="${ASSET2//\{V\}/$LATEST}"
            SHA2=$(echo "$CHECKSUMS" | awk -v pkg="$ASSET_FILE2" '$2 == pkg {print $1}')
            if [ -z "$SHA2" ]; then
              echo "ERROR: could not find SHA for ${ASSET_FILE2} in ${CHECKSUMS_FILE}"
              exit 1
            fi
            SHA_LINE="${SHA_LINE}
          - **SHA-256 (2):** \`${SHA2}\` (\`${ASSET_FILE2}\`)"
          fi

          git checkout -b "$BRANCH"
          sed -i "s|^${VERSION_VAR}=\".*\"|${VERSION_VAR}=\"${LATEST}\"|" "$FILE"
          if [ -n "$SHA_VAR" ]; then
            sed -i "s|^${SHA_VAR}=\".*\"|${SHA_VAR}=\"${SHA}\"|" "$FILE"
          fi
          if [ -n "$SHA_VAR2" ]; then
            sed -i "s|^${SHA_VAR2}=\".*\"|${SHA_VAR2}=\"${SHA2}\"|" "$FILE"
          fi
          git add "$FILE"
          git commit -m "Bump ${NAME} pin: ${CURRENT} -> ${LATEST}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "Bump ${NAME} pin: ${CURRENT} -> ${LATEST}" \
            --body "$(cat <<EOF
          Automated pin bump from the \`bump-pins\` workflow.

          - **Version:** \`${CURRENT}\` -> \`${LATEST}\`
          - **Published:** ${PUBLISHED} (${AGE_DAYS} days old; cooldown ${COOLDOWN_DAYS}d, ignore_cooldown=${IGNORE_COOLDOWN})
          ${SHA_LINE}
          - **Release notes:** https://github.com/${REPO}/releases/tag/${TAG}

          ${NOTE}
          Review checklist: release notes look sane, release is real on ${REPO}.
          On merge, devices converge on their next recurring Mosyle run.
          EOF
          )")

          # Hand the PR details to the Chat notify step
          {
            echo "pr_url=${PR_URL}"
            echo "old=${CURRENT}"
            echo "new=${LATEST}"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Google Chat (bump PR opened)
        if: ${{ steps.bump.outputs.pr_url != '' }}
        env:
          WEBHOOK: ${{ secrets.CHAT_WEBHOOK_URL }}
          NAME: ${{ matrix.name }}
          PR_URL: ${{ steps.bump.outputs.pr_url }}
          OLD: ${{ steps.bump.outputs.old }}
          NEW: ${{ steps.bump.outputs.new }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_REPO: ${{ github.repository }}
          GH_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "CHAT_WEBHOOK_URL secret not set — skipping notify."; exit 0; fi
          TEXT=$(printf '%s\n%s' \
            "<${RUN_URL}|Bump installer pins> · <${GH_REPO_URL}|${GH_REPO}>" \
            "✅ ${NAME}: ${OLD} -> ${NEW} — <${PR_URL}|review the PR>")
          jq -n --arg text "$TEXT" '{text: $text}' | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"

      - name: Notify Google Chat (job failed)
        if: ${{ failure() }}
        env:
          WEBHOOK: ${{ secrets.CHAT_WEBHOOK_URL }}
          NAME: ${{ matrix.name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_REPO: ${{ github.repository }}
          GH_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "CHAT_WEBHOOK_URL secret not set — skipping notify."; exit 0; fi
          TEXT=$(printf '%s\n%s' \
            "<${RUN_URL}|Bump installer pins> · <${GH_REPO_URL}|${GH_REPO}>" \
            "❌ ${NAME} job failed — <${RUN_URL}|run logs>")
          jq -n --arg text "$TEXT" '{text: $text}' | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"

  # ── HyperFrames: npm package `hyperframes`. Source of truth is the npm
  # registry — version pin only (no SHA; npm integrity is version + registry).
  hyperframes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check hyperframes (npm)
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FILE="software/hyperframes/install.sh"

          CURRENT=$(grep -m1 '^HYPERFRAMES_VERSION=' "$FILE" | cut -d'"' -f2)

          LATEST=$(npm view hyperframes version)
          if [ -z "$LATEST" ]; then
            echo "ERROR: could not read latest hyperframes version from npm."
            exit 1
          fi

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "hyperframes pin is current ($CURRENT). Nothing to do."
            exit 0
          fi

          REL_DATE=$(npm view hyperframes time --json | jq -r --arg v "$LATEST" '.[$v]')
          if [ -z "$REL_DATE" ] || [ "$REL_DATE" = "null" ]; then
            echo "ERROR: could not read publish time for hyperframes@${LATEST}."
            exit 1
          fi

          AGE_DAYS=$(( ( $(date +%s) - $(date -d "$REL_DATE" +%s) ) / 86400 ))
          if [ "$IGNORE_COOLDOWN" != "true" ] && [ "$AGE_DAYS" -lt "$COOLDOWN_DAYS" ]; then
            echo "hyperframes $LATEST is only ${AGE_DAYS}d old (< ${COOLDOWN_DAYS}d cooldown). Skipping until it ages."
            exit 0
          fi

          BRANCH="chore/bump-hyperframes-${LATEST}"
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists — PR presumably open. Skipping."
            exit 0
          fi

          git checkout -b "$BRANCH"
          sed -i "s|^HYPERFRAMES_VERSION=\".*\"|HYPERFRAMES_VERSION=\"${LATEST}\"|" "$FILE"
          git add "$FILE"
          git commit -m "Bump HyperFrames pin: ${CURRENT} -> ${LATEST}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "Bump HyperFrames pin: ${CURRENT} -> ${LATEST}" \
            --body "$(cat <<EOF
          Automated pin bump from the \`bump-pins\` workflow.

          - **Version:** \`${CURRENT}\` -> \`${LATEST}\` (npm package \`hyperframes\`)
          - **Published:** ${REL_DATE} (${AGE_DAYS} days old; cooldown ${COOLDOWN_DAYS}d, ignore_cooldown=${IGNORE_COOLDOWN})
          - **npm:** https://www.npmjs.com/package/hyperframes/v/${LATEST}
          - **Releases:** https://github.com/heygen-com/hyperframes/releases

          Note: only the CLI *version* is cooldown-pinned. The on-device skills the CLI fetches are live-latest (upstream force-refreshes them at runtime) and are not controlled by this bump.
          Review checklist: release notes look sane, version is a real published release on npm.
          On merge, devices converge on their next recurring Mosyle run.
          EOF
          )")

          {
            echo "pr_url=${PR_URL}"
            echo "old=${CURRENT}"
            echo "new=${LATEST}"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Google Chat (bump PR opened)
        if: ${{ steps.bump.outputs.pr_url != '' }}
        env:
          WEBHOOK: ${{ secrets.CHAT_WEBHOOK_URL }}
          PR_URL: ${{ steps.bump.outputs.pr_url }}
          OLD: ${{ steps.bump.outputs.old }}
          NEW: ${{ steps.bump.outputs.new }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "CHAT_WEBHOOK_URL secret not set — skipping notify."; exit 0; fi
          TEXT=$(printf '%s\n%s' \
            "<${RUN_URL}|Bump installer pins> · <${REPO_URL}|${REPO}>" \
            "✅ HyperFrames: ${OLD} -> ${NEW} — <${PR_URL}|review the PR>")
          jq -n --arg text "$TEXT" '{text: $text}' | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"

      - name: Notify Google Chat (job failed)
        if: ${{ failure() }}
        env:
          WEBHOOK: ${{ secrets.CHAT_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "CHAT_WEBHOOK_URL secret not set — skipping notify."; exit 0; fi
          TEXT=$(printf '%s\n%s' \
            "<${RUN_URL}|Bump installer pins> · <${REPO_URL}|${REPO}>" \
            "❌ HyperFrames job failed — <${RUN_URL}|run logs>")
          jq -n --arg text "$TEXT" '{text: $text}' | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"

  # ── FFmpeg: static macOS binaries from eugeneware/ffmpeg-static's GitHub
  # releases. Dedicated (not a github-release matrix row) because upstream ships
  # NO checksums file — this job downloads all four darwin assets (ffmpeg +
  # ffprobe, per arch) and hashes them in-CI (~200 MB pull; fine on GH runners).
  # Release tag is b<version> (leading `b`); the script pins the bare version.
  ffmpeg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check FFmpeg (eugeneware/ffmpeg-static)
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FILE="software/ffmpeg/install.sh"
          REPO="eugeneware/ffmpeg-static"

          CURRENT=$(grep -m1 '^FFMPEG_VERSION=' "$FILE" | cut -d'"' -f2)

          RELEASE=$(gh api "repos/${REPO}/releases/latest")
          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          LATEST="${TAG#b}" # tag is b<version>; strip the leading b
          PUBLISHED=$(echo "$RELEASE" | jq -r '.published_at')

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "FFmpeg pin is current (${CURRENT}). Nothing to do."
            exit 0
          fi

          AGE_DAYS=$(( ( $(date +%s) - $(date -d "$PUBLISHED" +%s) ) / 86400 ))
          if [ "$IGNORE_COOLDOWN" != "true" ] && [ "$AGE_DAYS" -lt "$COOLDOWN_DAYS" ]; then
            echo "FFmpeg ${LATEST} is only ${AGE_DAYS}d old (< ${COOLDOWN_DAYS}d cooldown). Skipping until it ages."
            exit 0
          fi

          BRANCH="chore/bump-ffmpeg-${LATEST}"
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists — PR presumably open. Skipping."
            exit 0
          fi

          # Upstream publishes no checksums file — download each darwin asset
          # (ffmpeg + ffprobe, per arch) and hash it. ~200 MB pulled in-CI.
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          FFMPEG_ARM64=$(curl -fsSL "${BASE}/ffmpeg-darwin-arm64"   | sha256sum | awk '{print $1}')
          FFMPEG_AMD64=$(curl -fsSL "${BASE}/ffmpeg-darwin-x64"     | sha256sum | awk '{print $1}')
          FFPROBE_ARM64=$(curl -fsSL "${BASE}/ffprobe-darwin-arm64" | sha256sum | awk '{print $1}')
          FFPROBE_AMD64=$(curl -fsSL "${BASE}/ffprobe-darwin-x64"   | sha256sum | awk '{print $1}')
          for v in "$FFMPEG_ARM64" "$FFMPEG_AMD64" "$FFPROBE_ARM64" "$FFPROBE_AMD64"; do
            if [ -z "$v" ]; then echo "ERROR: failed to compute one of the four SHAs."; exit 1; fi
          done

          git checkout -b "$BRANCH"
          sed -i "s|^FFMPEG_VERSION=\".*\"|FFMPEG_VERSION=\"${LATEST}\"|" "$FILE"
          sed -i "s|^FFMPEG_SHA256_ARM64=\".*\"|FFMPEG_SHA256_ARM64=\"${FFMPEG_ARM64}\"|" "$FILE"
          sed -i "s|^FFMPEG_SHA256_AMD64=\".*\"|FFMPEG_SHA256_AMD64=\"${FFMPEG_AMD64}\"|" "$FILE"
          sed -i "s|^FFPROBE_SHA256_ARM64=\".*\"|FFPROBE_SHA256_ARM64=\"${FFPROBE_ARM64}\"|" "$FILE"
          sed -i "s|^FFPROBE_SHA256_AMD64=\".*\"|FFPROBE_SHA256_AMD64=\"${FFPROBE_AMD64}\"|" "$FILE"
          git add "$FILE"
          git commit -m "Bump FFmpeg pin: ${CURRENT} -> ${LATEST}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "Bump FFmpeg pin: ${CURRENT} -> ${LATEST}" \
            --body "$(cat <<EOF
          Automated pin bump from the \`bump-pins\` workflow.

          - **Version:** \`${CURRENT}\` -> \`${LATEST}\` (release tag \`${TAG}\`)
          - **Published:** ${PUBLISHED} (${AGE_DAYS} days old; cooldown ${COOLDOWN_DAYS}d, ignore_cooldown=${IGNORE_COOLDOWN})
          - **ffmpeg SHA-256:** arm64 \`${FFMPEG_ARM64}\`, x64 \`${FFMPEG_AMD64}\`
          - **ffprobe SHA-256:** arm64 \`${FFPROBE_ARM64}\`, x64 \`${FFPROBE_AMD64}\`
          - **Release:** https://github.com/${REPO}/releases/tag/${TAG}

          Unsigned community static build — the pinned SHAs are the only integrity check (same posture as higgsfield). Upstream publishes no checksums file, so these were computed by downloading each asset in this CI run.
          Review checklist: release is real on ${REPO}; both SHAs come from the assets downloaded in this run.
          On merge, devices converge on their next recurring Mosyle run.
          EOF
          )")

          {
            echo "pr_url=${PR_URL}"
            echo "old=${CURRENT}"
            echo "new=${LATEST}"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Google Chat (bump PR opened)
        if: ${{ steps.bump.outputs.pr_url != '' }}
        env:
          WEBHOOK: ${{ secrets.CHAT_WEBHOOK_URL }}
          PR_URL: ${{ steps.bump.outputs.pr_url }}
          OLD: ${{ steps.bump.outputs.old }}
          NEW: ${{ steps.bump.outputs.new }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "CHAT_WEBHOOK_URL secret not set — skipping notify."; exit 0; fi
          TEXT=$(printf '%s\n%s' \
            "<${RUN_URL}|Bump installer pins> · <${REPO_URL}|${REPO}>" \
            "✅ FFmpeg: ${OLD} -> ${NEW} — <${PR_URL}|review the PR>")
          jq -n --arg text "$TEXT" '{text: $text}' | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"

      - name: Notify Google Chat (job failed)
        if: ${{ failure() }}
        env:
          WEBHOOK: ${{ secrets.CHAT_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "CHAT_WEBHOOK_URL secret not set — skipping notify."; exit 0; fi
          TEXT=$(printf '%s\n%s' \
            "<${RUN_URL}|Bump installer pins> · <${REPO_URL}|${REPO}>" \
            "❌ FFmpeg job failed — <${RUN_URL}|run logs>")
          jq -n --arg text "$TEXT" '{text: $text}' | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"

  # ── Firebase CLI: npm package `firebase-tools`. Same shape as hyperframes —
  # version pin only (npm integrity is version + registry).
  firebase-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check firebase-tools (npm)
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FILE="software/firebase-tools/install.sh"

          CURRENT=$(grep -m1 '^FIREBASE_TOOLS_VERSION=' "$FILE" | cut -d'"' -f2)

          LATEST=$(npm view firebase-tools version)
          if [ -z "$LATEST" ]; then
            echo "ERROR: could not read latest firebase-tools version from npm."
            exit 1
          fi

          if [ "$LATEST" = "$CURRENT" ]; then
            echo "firebase-tools pin is current ($CURRENT). Nothing to do."
            exit 0
          fi

          REL_DATE=$(npm view firebase-tools time --json | jq -r --arg v "$LATEST" '.[$v]')
          if [ -z "$REL_DATE" ] || [ "$REL_DATE" = "null" ]; then
            echo "ERROR: could not read publish time for firebase-tools@${LATEST}."
            exit 1
          fi

          AGE_DAYS=$(( ( $(date +%s) - $(date -d "$REL_DATE" +%s) ) / 86400 ))
          if [ "$IGNORE_COOLDOWN" != "true" ] && [ "$AGE_DAYS" -lt "$COOLDOWN_DAYS" ]; then
            echo "firebase-tools $LATEST is only ${AGE_DAYS}d old (< ${COOLDOWN_DAYS}d cooldown). Skipping until it ages."
            exit 0
          fi

          BRANCH="chore/bump-firebase-tools-${LATEST}"
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists — PR presumably open. Skipping."
            exit 0
          fi

          git checkout -b "$BRANCH"
          sed -i "s|^FIREBASE_TOOLS_VERSION=\".*\"|FIREBASE_TOOLS_VERSION=\"${LATEST}\"|" "$FILE"
          git add "$FILE"
          git commit -m "Bump firebase-tools pin: ${CURRENT} -> ${LATEST}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "Bump firebase-tools pin: ${CURRENT} -> ${LATEST}" \
            --body "$(cat <<EOF
          Automated pin bump from the \`bump-pins\` workflow.

          - **Version:** \`${CURRENT}\` -> \`${LATEST}\` (npm package \`firebase-tools\`)
          - **Published:** ${REL_DATE} (${AGE_DAYS} days old; cooldown ${COOLDOWN_DAYS}d, ignore_cooldown=${IGNORE_COOLDOWN})
          - **npm:** https://www.npmjs.com/package/firebase-tools/v/${LATEST}
          - **Release notes:** https://github.com/firebase/firebase-tools/releases/tag/v${LATEST}

          This binary carries the fleet's Firebase CLI, emulators, and MCP server — the single version every project's \`.mcp.json\` resolves to.
          Review checklist: release notes look sane, version is a real published release on npm.
          On merge, devices converge on their next recurring Mosyle run.
          EOF
          )")

          {
            echo "pr_url=${PR_URL}"
            echo "old=${CURRENT}"
            echo "new=${LATEST}"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Google Chat (bump PR opened)
        if: ${{ steps.bump.outputs.pr_url != '' }}
        env:
          WEBHOOK: ${{ secrets.CHAT_WEBHOOK_URL }}
          PR_URL: ${{ steps.bump.outputs.pr_url }}
          OLD: ${{ steps.bump.outputs.old }}
          NEW: ${{ steps.bump.outputs.new }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "CHAT_WEBHOOK_URL secret not set — skipping notify."; exit 0; fi
          TEXT=$(printf '%s\n%s' \
            "<${RUN_URL}|Bump installer pins> · <${REPO_URL}|${REPO}>" \
            "✅ firebase-tools: ${OLD} -> ${NEW} — <${PR_URL}|review the PR>")
          jq -n --arg text "$TEXT" '{text: $text}' | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"

      - name: Notify Google Chat (job failed)
        if: ${{ failure() }}
        env:
          WEBHOOK: ${{ secrets.CHAT_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "CHAT_WEBHOOK_URL secret not set — skipping notify."; exit 0; fi
          TEXT=$(printf '%s\n%s' \
            "<${RUN_URL}|Bump installer pins> · <${REPO_URL}|${REPO}>" \
            "❌ firebase-tools job failed — <${RUN_URL}|run logs>")
          jq -n --arg text "$TEXT" '{text: $text}' | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"

  # ── Temurin JRE: the Adoptium API is the source of truth (release tags use a
  # jdk-<ver>+<build> scheme the github-release matrix can't template, and the
  # API publishes the pkg checksums directly). Deliberately tracks ONE LTS
  # major (TEMURIN_MAJOR in the script) — moving majors is a manual change to
  # the script, never an automated bump.
  temurin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check Temurin JRE (Adoptium API)
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FILE="software/java/install.sh"

          MAJOR=$(grep -m1 '^TEMURIN_MAJOR=' "$FILE" | cut -d'"' -f2)
          CUR_VER=$(grep -m1 '^TEMURIN_VERSION=' "$FILE" | cut -d'"' -f2)
          CUR_BUILD=$(grep -m1 '^TEMURIN_BUILD=' "$FILE" | cut -d'"' -f2)

          API=$(curl -fsSL "https://api.adoptium.net/v3/assets/latest/${MAJOR}/hotspot?os=mac&image_type=jre&vendor=eclipse")
          RELEASE_NAME=$(echo "$API" | jq -r '.[0].release_name') # e.g. jdk-21.0.11+10
          BARE="${RELEASE_NAME#jdk-}"
          LATEST_VER="${BARE%+*}"
          LATEST_BUILD="${BARE#*+}"
          if [ -z "$LATEST_VER" ] || [ -z "$LATEST_BUILD" ] || [ "$RELEASE_NAME" = "null" ]; then
            echo "ERROR: could not parse release_name from the Adoptium API."
            exit 1
          fi

          if [ "$LATEST_VER" = "$CUR_VER" ] && [ "$LATEST_BUILD" = "$CUR_BUILD" ]; then
            echo "Temurin pin is current (${CUR_VER}+${CUR_BUILD}). Nothing to do."
            exit 0
          fi

          # binary.updated_at stands in for the release date (avoids fetching
          # the GitHub release by its +-bearing tag just for a timestamp).
          PUBLISHED=$(echo "$API" | jq -r '.[0].binary.updated_at')
          AGE_DAYS=$(( ( $(date +%s) - $(date -d "$PUBLISHED" +%s) ) / 86400 ))
          if [ "$IGNORE_COOLDOWN" != "true" ] && [ "$AGE_DAYS" -lt "$COOLDOWN_DAYS" ]; then
            echo "Temurin ${LATEST_VER}+${LATEST_BUILD} is only ${AGE_DAYS}d old (< ${COOLDOWN_DAYS}d cooldown). Skipping until it ages."
            exit 0
          fi

          BRANCH="chore/bump-temurin-${LATEST_VER}-${LATEST_BUILD}"
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
            echo "Branch ${BRANCH} already exists — PR presumably open. Skipping."
            exit 0
          fi

          SHA_ARM64=$(echo "$API" | jq -r '.[] | select(.binary.architecture=="aarch64") | .binary.installer.checksum')
          SHA_X64=$(echo "$API" | jq -r '.[] | select(.binary.architecture=="x64") | .binary.installer.checksum')
          if [ -z "$SHA_ARM64" ] || [ "$SHA_ARM64" = "null" ] || [ -z "$SHA_X64" ] || [ "$SHA_X64" = "null" ]; then
            echo "ERROR: could not read per-arch installer checksums from the Adoptium API."
            exit 1
          fi

          git checkout -b "$BRANCH"
          sed -i "s|^TEMURIN_VERSION=\".*\"|TEMURIN_VERSION=\"${LATEST_VER}\"|" "$FILE"
          sed -i "s|^TEMURIN_BUILD=\".*\"|TEMURIN_BUILD=\"${LATEST_BUILD}\"|" "$FILE"
          sed -i "s|^TEMURIN_SHA256_ARM64=\".*\"|TEMURIN_SHA256_ARM64=\"${SHA_ARM64}\"|" "$FILE"
          sed -i "s|^TEMURIN_SHA256_X64=\".*\"|TEMURIN_SHA256_X64=\"${SHA_X64}\"|" "$FILE"
          git add "$FILE"
          git commit -m "Bump Temurin JRE pin: ${CUR_VER}+${CUR_BUILD} -> ${LATEST_VER}+${LATEST_BUILD}"
          git push origin "$BRANCH"

          RELEASE_URL="https://github.com/adoptium/temurin${MAJOR}-binaries/releases/tag/jdk-${LATEST_VER}%2B${LATEST_BUILD}"
          PR_URL=$(gh pr create \
            --title "Bump Temurin JRE pin: ${CUR_VER}+${CUR_BUILD} -> ${LATEST_VER}+${LATEST_BUILD}" \
            --body "$(cat <<EOF
          Automated pin bump from the \`bump-pins\` workflow.

          - **Version:** \`${CUR_VER}+${CUR_BUILD}\` -> \`${LATEST_VER}+${LATEST_BUILD}\` (Temurin ${MAJOR} JRE)
          - **Binary updated:** ${PUBLISHED} (${AGE_DAYS} days old; cooldown ${COOLDOWN_DAYS}d, ignore_cooldown=${IGNORE_COOLDOWN})
          - **SHA-256 (aarch64):** \`${SHA_ARM64}\`
          - **SHA-256 (x64):** \`${SHA_X64}\` (both from the Adoptium API)
          - **Release:** ${RELEASE_URL}

          Signed Eclipse Adoptium pkgs; the pinned SHAs are verified anyway. This job tracks the ${MAJOR} LTS line only — a new LTS major is a manual change.
          Review checklist: release is real on adoptium/temurin${MAJOR}-binaries; checksums came from the Adoptium API in this run.
          On merge, devices converge on their next recurring Mosyle run.
          EOF
          )")

          {
            echo "pr_url=${PR_URL}"
            echo "old=${CUR_VER}+${CUR_BUILD}"
            echo "new=${LATEST_VER}+${LATEST_BUILD}"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Google Chat (bump PR opened)
        if: ${{ steps.bump.outputs.pr_url != '' }}
        env:
          WEBHOOK: ${{ secrets.CHAT_WEBHOOK_URL }}
          PR_URL: ${{ steps.bump.outputs.pr_url }}
          OLD: ${{ steps.bump.outputs.old }}
          NEW: ${{ steps.bump.outputs.new }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "CHAT_WEBHOOK_URL secret not set — skipping notify."; exit 0; fi
          TEXT=$(printf '%s\n%s' \
            "<${RUN_URL}|Bump installer pins> · <${REPO_URL}|${REPO}>" \
            "✅ Temurin JRE: ${OLD} -> ${NEW} — <${PR_URL}|review the PR>")
          jq -n --arg text "$TEXT" '{text: $text}' | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"

      - name: Notify Google Chat (job failed)
        if: ${{ failure() }}
        env:
          WEBHOOK: ${{ secrets.CHAT_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then echo "CHAT_WEBHOOK_URL secret not set — skipping notify."; exit 0; fi
          TEXT=$(printf '%s\n%s' \
            "<${RUN_URL}|Bump installer pins> · <${REPO_URL}|${REPO}>" \
            "❌ Temurin JRE job failed — <${RUN_URL}|run logs>")
          jq -n --arg text "$TEXT" '{text: $text}' | curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"
